<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TR4CK Sign Up</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        background: #08120c;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      }
      .grid-glow {
        background: radial-gradient(circle at top left, rgba(34, 197, 94, 0.22), transparent 34%),
          radial-gradient(circle at 35% 40%, rgba(134, 239, 172, 0.16), transparent 30%),
          radial-gradient(circle at 78% 14%, rgba(16, 185, 129, 0.18), transparent 24%);
      }
      .motion-ring {
        animation: float 10s ease-in-out infinite;
      }
      .motion-ring:nth-child(2) {
        animation-delay: 2s;
        left: 70%;
        top: 15%;
      }
      .motion-ring:nth-child(3) {
        animation-delay: 4s;
        left: 20%;
        top: 75%;
      }
      .tree {
        position: absolute;
        bottom: 0;
        width: 18px;
        height: 160px;
        background: linear-gradient(180deg, rgba(46, 59, 54, 0.18), rgba(16, 18, 15, 1));
        border-radius: 16px 16px 4px 4px;
        transform-origin: bottom center;
        box-shadow: inset 0 0 0 1px rgba(106, 120, 113, 0.16);
      }
      .tree::before,
      .tree::after {
        content: '';
        position: absolute;
        left: 50%;
        width: 0;
        border-style: solid;
        border-color: transparent transparent rgba(106, 120, 113, 0.76) transparent;
      }
      .tree::before {
        bottom: 56px;
        margin-left: -42px;
        border-width: 0 42px 48px 42px;
      }
      .tree::after {
        bottom: 96px;
        margin-left: -28px;
        border-width: 0 28px 36px 28px;
      }
      .forest-fog {
        position: absolute;
        inset: 0;
        pointer-events: none;
        background: radial-gradient(circle at 40% 20%, rgba(132, 204, 22, 0.08), transparent 22%),
          radial-gradient(circle at 60% 35%, rgba(148, 163, 184, 0.08), transparent 18%),
          radial-gradient(circle at 20% 55%, rgba(107, 114, 128, 0.06), transparent 20%);
        z-index: 1;
        animation: drift 16s ease-in-out infinite;
      }
      .forest-fog::after {
        content: '';
        position: absolute;
        inset: 0;
        background: linear-gradient(180deg, transparent 30%, rgba(22, 28, 24, 0.92) 75%);
        opacity: 0.7;
      }
      @keyframes drift {
        0%, 100% { transform: translateX(0) scale(1); }
        50% { transform: translateX(-18px) scale(1.02); }
      }
      @keyframes float {
        0%, 100% { transform: translate3d(0, 0, 0) scale(1);
background-size: 120% 120%; }
        50% { transform: translate3d(0, 12px, 0) scale(1.05); }
      }
    </style>
  </head>
  <body class="relative overflow-hidden text-slate-100">
    <div class="absolute inset-0 bg-[#041007] bg-[radial-gradient(circle_at_top,_rgba(16,185,129,0.25),_transparent_28%),radial-gradient(circle_at_30%_50%,_rgba(52,211,153,0.18),_transparent_24%),radial-gradient(circle_at_80%_15%,_rgba(34,197,94,0.16),_transparent_20%)]"></div>

    <div class="absolute inset-0 bg-[linear-gradient(180deg,_rgba(15,49,21,0.95)_0%,_rgba(10,25,12,0.75)_70%,_rgba(4,10,7,0.9)_100%)]">
      <div class="absolute inset-x-0 bottom-0 h-48 bg-[linear-gradient(180deg,transparent,rgba(4,10,7,0.95))]"></div>
      <div class="absolute left-1/2 bottom-8 h-48 w-64 -translate-x-1/2 bg-[radial-gradient(circle,_rgba(56,189,87,0.18),transparent_55%)]"></div>
    </div>

    <div class="absolute inset-0 overflow-hidden">
      <div class="forest-fog"></div>
      <div class="tree left-[8%] bottom-2 rotate-[-2deg] scale-[0.9]"></div>
      <div class="tree left-[18%] bottom-4 rotate-[2deg] scale-[1.1]"></div>
      <div class="tree left-[32%] bottom-0 rotate-[-1deg] scale-[0.85]"></div>
      <div class="tree left-[48%] bottom-1 rotate-[1deg] scale-[1.2]"></div>
      <div class="tree left-[64%] bottom-3 rotate-[-3deg] scale-[0.95]"></div>
      <div class="tree left-[78%] bottom-0 rotate-[2deg] scale-[1]"></div>
      <div class="motion-ring absolute left-10 top-12 h-40 w-40 rounded-full border border-emerald-500/20 blur-2xl"></div>
      <div class="motion-ring absolute h-56 w-56 rounded-full border border-lime-400/20 blur-2xl"></div>
      <div class="motion-ring absolute h-48 w-48 rounded-full border border-emerald-300/20 blur-2xl"></div>
      <div class="absolute inset-x-0 bottom-0 h-48 bg-[linear-gradient(180deg,transparent,rgba(4,10,7,0.95))] shadow-[0_0_80px_20px_rgba(16,185,129,0.12)]"></div>
    </div>

    <div class="relative z-10 min-h-screen flex items-center justify-center px-6 py-16">
      <div class="relative w-full max-w-lg">
        <div class="absolute inset-x-0 top-0 h-48 bg-gradient-to-r from-emerald-500/20 via-lime-400/10 to-emerald-300/20 blur-3xl"></div>
        <div class="relative rounded-[32px] border border-slate-500/15 bg-slate-900/90 p-10 shadow-[0_25px_120px_-45px_rgba(30,41,59,0.35)] backdrop-blur-xl">
          <div class="mb-8 text-center">
            <p class="text-sm uppercase tracking-[0.4em] text-slate-400/80">Ready to join</p>
            <h1 class="text-5xl font-semibold tracking-tight text-slate-100 drop-shadow-[0_16px_80px_rgba(34,197,94,0.15)]">
              Sign Up
            </h1>
            <p class="mt-3 text-slate-400">Create your TR4CK account and enter the forest grid.</p>
          </div>

          <form class="space-y-6" action="#" onsubmit="handleSignup(event)">
            <div>
              <label class="block mb-2 text-sm font-medium text-slate-300" for="username">Username</label>
              <input id="username" name="username" type="text" required placeholder="pilot_47"
                class="w-full rounded-3xl border border-slate-800 bg-slate-900/85 px-4 py-3 text-slate-100 outline-none transition focus:border-emerald-400 focus:ring-4 focus:ring-emerald-400/15" />
            </div>

            <div>
              <label class="block mb-2 text-sm font-medium text-slate-300" for="email">Email</label>
              <input id="email" name="email" type="email" required placeholder="pilot@example.com"
                class="w-full rounded-3xl border border-slate-800 bg-slate-900/85 px-4 py-3 text-slate-100 outline-none transition focus:border-lime-400 focus:ring-4 focus:ring-lime-400/15" />
            </div>

            <div>
              <label class="block mb-2 text-sm font-medium text-slate-300" for="password">Password</label>
              <input id="password" name="password" type="password" required placeholder="********"
                class="w-full rounded-3xl border border-slate-800 bg-slate-900/85 px-4 py-3 text-slate-100 outline-none transition focus:border-lime-400 focus:ring-4 focus:ring-lime-400/15" />
            </div>

            <div>
              <label class="block mb-2 text-sm font-medium text-slate-300" for="confirm-password">Confirm Password</label>
              <input id="confirm-password" name="confirm-password" type="password" required placeholder="********"
                class="w-full rounded-3xl border border-slate-800 bg-slate-900/85 px-4 py-3 text-slate-100 outline-none transition focus:border-lime-400 focus:ring-4 focus:ring-lime-400/15" />
            </div>

            <button type="submit"
              class="group relative flex w-full items-center justify-center rounded-3xl bg-gradient-to-r from-slate-500 via-slate-400 to-emerald-500 px-5 py-3 text-sm font-semibold text-slate-950 shadow-lg shadow-slate-800/30 transition-transform duration-300 hover:-translate-y-1 hover:shadow-slate-800/40 focus:outline-none focus:ring-4 focus:ring-slate-400/30">
              <span class="absolute inset-0 rounded-3xl bg-white/5 opacity-0 transition group-hover:opacity-100"></span>
              <span class="relative">Create Account</span>
            </button>
          </form>

          <div class="mt-8 flex items-center justify-between text-sm text-slate-500">
            <span>Already have an account?</span>
            <a href="login.html" class="text-emerald-300 transition hover:text-emerald-200">Go to Login</a>
          </div>
        </div>
      </div>
    </div>

    <script>
      function handleSignup(event) {
        event.preventDefault();
        const form = event.currentTarget;
        const button = form.querySelector('button[type="submit"]');
        button.innerHTML = 'Creating...';
        setTimeout(() => {
          button.innerHTML = 'Welcome Aboard';
          button.classList.remove('bg-gradient-to-r', 'from-slate-500', 'via-slate-400', 'to-emerald-500');
          button.classList.add('bg-emerald-400', 'text-slate-950');
        }, 1100);
      }
    </script>
  </body>
</html>
