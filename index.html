<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wolf Hunter FPS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <canvas id="game-canvas"></canvas>
        <div id="ui">
            <div id="health">Health: 100</div>
            <div id="ammo">Ammo: 30</div>
            <div id="inventory">
                <div>Wolf Paws: <span id="paws-count">0</span></div>
                <div>Wolf Heads: <span id="heads-count">0</span></div>
                <div>Wolf Pelts: <span id="pelts-count">0</span></div>
            </div>
            <div id="pickup-prompt" style="display: none; margin-top: 10px; color: yellow; font-weight: bold;"></div>
        </div>
        <div id="hotbar">
            <div id="slot-0" class="slot active"><span class="slot-number">1</span></div>
            <div id="slot-1" class="slot"><span class="slot-number">2</span></div>
            <div id="slot-2" class="slot"><span class="slot-number">3</span></div>
            <div id="slot-3" class="slot"><span class="slot-number">4</span></div>
        </div>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/utils/SkeletonUtils.js"></script>
    <script src="game.js"></script>
</body>
</html>
